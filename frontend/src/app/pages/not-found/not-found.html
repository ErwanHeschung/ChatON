<app-public>
  <div class="title">
    <img ngSrc="/chatON-logo.svg" alt="App logo" class="not-found-image" width="500" height="500" />
    <h1 i18n="Not found title|Title displayed on the not found page@@not-found-title">404</h1>
  </div>
  <p
    i18n="
      Not found description|A short description displayed on the not found
      page@@not-found-description"
  >
    Oops! The page you're looking for doesn't exist. It might have been moved or deleted.
  </p>
  <button
    class="btn"
    routerLink="/"
    i18n="Not found button|Text for the button that redirects to the landing page@@not-found-button"
  >
    Go to Home
  </button>
</app-public>
