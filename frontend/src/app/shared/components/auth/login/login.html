<h2 i18n="@@login-title">Login</h2>

<form [formGroup]="LoginForm" (ngSubmit)="onSubmit()">
  <div class="field">
    <label for="username">Username</label>
    <input
      id="username"
      formControlName="username"
      placeholder="Username"
      i18n-placeholder="@@login.username-placeholder"
      autocomplete="username"
    />
    @if (LoginForm.controls.username.touched && LoginForm.controls.username.invalid) {
      <small class="error" i18n="@@login.username-invalid-error"
        >Username is required (min 3 characters)</small
      >
    }
  </div>

  <div class="field">
    <label for="password" i18n="@@register.password-label">Password</label>
    <input id="password" type="password" formControlName="password" autocomplete="new-password" />
    @if (LoginForm.controls.password.touched && LoginForm.controls.password.invalid) {
      <small class="error" i18n="@@login.password-invalid-error"
        >Password is required (min 8 characters)</small
      >
    }
  </div>

  <button type="submit" class="btn" [disabled]="LoginForm.invalid" i18n="@@login.submit-button">
    Login
  </button>
</form>
